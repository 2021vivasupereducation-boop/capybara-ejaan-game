<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>水豚 Ejaan 小游戏</title>
  <style>
    :root {
      --bg: #fff6df;
      --ink: #4a2f1d;
      --muted: #7a5b3e;
      --card: #fffdf7;
      --line: #d9b776;
      --gold: #f5c85d;
      --green: #72b95b;
      --green-dark: #3f8a39;
      --aqua: #78c9c4;
      --blue: #64abe9;
      --orange: #f4a63d;
      --red: #e7685c;
      --shadow: 0 16px 0 rgba(116, 78, 38, .18), 0 22px 38px rgba(116, 78, 38, .2);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, rgba(124, 196, 111, .28) 0 52px, transparent 54px),
        radial-gradient(circle at 92% 18%, rgba(126, 201, 196, .24) 0 70px, transparent 72px),
        linear-gradient(180deg, #fff2c8 0%, var(--bg) 42%, #fffaf0 100%);
    }

    button, input { font: inherit; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px 18px 30px;
    }

    header {
      display: grid;
      grid-template-columns: 72px 1fr 118px;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .icon-btn, .score {
      min-height: 64px;
      border: 3px solid #e0a93e;
      border-radius: 22px;
      background: rgba(255, 253, 247, .88);
      box-shadow: 0 5px 0 rgba(142, 93, 30, .18);
    }

    .icon-btn {
      display: grid;
      place-items: center;
      color: #865620;
      cursor: pointer;
    }

    .hamburger {
      width: 34px;
      height: 24px;
      display: grid;
      gap: 6px;
    }

    .hamburger span {
      display: block;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }

    .brand { text-align: center; }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1.04;
      letter-spacing: 0;
      color: #58361e;
    }

    .tagline {
      margin-top: 8px;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700;
      color: #704b2e;
    }

    .score {
      display: grid;
      place-items: center;
      padding: 6px;
      text-align: center;
      font-weight: 800;
    }

    .score small {
      display: block;
      font-size: 15px;
      color: #8a5d25;
    }

    .score strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }

    .progress-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 3px solid #e1ad49;
      border-radius: 26px;
      background: rgba(255, 253, 247, .92);
      overflow-x: auto;
    }

    .progress-label {
      flex: 0 0 auto;
      padding: 13px 20px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(180deg, #7fc763, #428d3d);
      font-weight: 900;
      font-size: 20px;
      white-space: nowrap;
    }

    .dot {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border: 3px solid #e5bf6e;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fffaf0;
      color: #7a4e23;
      font-weight: 900;
    }

    .dot.done { background: #dff0b1; border-color: #75b75b; }
    .dot.current { background: #fff7ce; border-color: #49a34c; box-shadow: 0 0 0 5px rgba(80, 160, 70, .18); }

    .mission-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .mission-chip {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 14px;
      border: 3px solid #e3b253;
      border-radius: 24px;
      background: rgba(255, 253, 247, .93);
      box-shadow: 0 6px 0 rgba(142, 93, 30, .16);
      font-weight: 900;
      color: #5d3b21;
      text-align: center;
      min-width: 0;
    }

    .mission-chip span {
      font-size: 28px;
      line-height: 1;
    }

    .mission-chip strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .mission-chip small {
      display: block;
      margin-top: 2px;
      font-size: 14px;
      color: #8a5d25;
    }

    .river-scene {
      position: relative;
      min-height: 340px;
      margin-top: 18px;
      border-radius: 34px;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 22%, #76b957 0 86px, transparent 88px),
        radial-gradient(circle at 84% 18%, #86c46b 0 110px, transparent 112px),
        linear-gradient(180deg, #dff4c2 0%, #bce4a7 42%, #8ed9d5 43%, #62c4c2 68%, #bdeaa8 69%, #dff3bd 100%);
      box-shadow: inset 0 -8px 0 rgba(87, 130, 74, .14);
    }

    .river-scene::before {
      content: "";
      position: absolute;
      inset: 42% 0 29%;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(255,255,255,.45) 0 34px, transparent 36px),
        radial-gradient(ellipse at 56% 54%, rgba(255,255,255,.38) 0 44px, transparent 46px),
        radial-gradient(ellipse at 78% 36%, rgba(255,255,255,.35) 0 30px, transparent 32px);
    }

    .stone-row {
      position: absolute;
      inset: 132px 42px auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: end;
      gap: 24px;
    }

    .stone {
      height: 86px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 42% 32%, #f2f1e6 0 22%, #cfcfc8 56%, #9c9b92 100%);
      border: 4px solid rgba(107, 99, 82, .58);
      box-shadow: 0 11px 0 rgba(36, 104, 106, .18);
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: 900;
      color: #654629;
    }

    .stone:nth-child(2) { transform: translateY(-18px); }
    .stone:nth-child(4) { transform: translateY(-12px); }

    .capy {
      position: absolute;
      left: var(--capy-x, 6%);
      top: 92px;
      width: 148px;
      height: 148px;
      transition: left .45s ease, transform .25s ease;
      filter: drop-shadow(0 9px 0 rgba(87, 57, 30, .15));
    }

    .capy.hop { transform: translateY(-12px); }

    .flag {
      position: absolute;
      right: 32px;
      top: 74px;
      width: 8px;
      height: 150px;
      background: #7d5a3c;
      border-radius: 999px;
    }

    .flag::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 8px;
      width: 64px;
      height: 42px;
      background: #f26b54;
      border-radius: 0 18px 18px 0;
      clip-path: polygon(0 0, 100% 0, 78% 50%, 100% 100%, 0 100%);
    }

    main {
      margin-top: -42px;
      position: relative;
      z-index: 2;
      display: grid;
      gap: 18px;
    }

    .question {
      border: 4px solid #e5bd63;
      border-radius: 36px;
      padding: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .q-num {
      display: inline-block;
      padding: 12px 42px;
      margin-top: -58px;
      border: 4px solid #fffaf0;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffe08b, #f8bf4d);
      box-shadow: 0 5px 0 rgba(129, 88, 28, .18);
      font-size: 24px;
      font-weight: 900;
    }

    .meaning {
      margin: 22px 0 4px;
      font-size: clamp(56px, 12vw, 112px);
      line-height: 1;
      font-weight: 900;
      color: #5b351b;
    }

    .pinyin {
      font-size: clamp(18px, 4vw, 30px);
      font-weight: 800;
      color: #704b2e;
    }

    .hint-line {
      margin-top: 18px;
      font-size: clamp(18px, 3.4vw, 26px);
      font-weight: 800;
      color: #3f8a39;
      overflow-wrap: anywhere;
    }

    .answer-panel {
      border: 4px solid #df9d28;
      border-radius: 30px;
      padding: 24px;
      background: rgba(255, 253, 247, .94);
      box-shadow: var(--shadow);
    }

    .answer-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-bottom: 14px;
      padding: 8px 18px;
      border: 3px solid #e4bf75;
      border-radius: 999px;
      background: #fff8e8;
      color: #6c4525;
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 72px;
      padding: 0 22px;
      border: 4px solid #4a9f4a;
      border-radius: 20px;
      background: white;
      color: #382619;
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 800;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 6px rgba(94, 173, 87, .18);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .choice-option {
      min-height: 76px;
      padding: 12px 16px;
      border: 4px solid #e4bf75;
      border-radius: 22px;
      background: #fff8e8;
      color: #4a2f1d;
      font-size: clamp(20px, 3.4vw, 30px);
      font-weight: 900;
      line-height: 1.15;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(116, 78, 38, .18);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .choice-option:hover,
    .choice-option:focus {
      border-color: #4a9f4a;
      outline: none;
      box-shadow: 0 7px 0 rgba(63, 138, 57, .2), 0 0 0 5px rgba(94, 173, 87, .16);
    }

    .choice-option:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 rgba(116, 78, 38, .18);
    }

    .choice-option.correct {
      border-color: #65aa4e;
      background: #dff0b1;
    }

    .choice-option.wrong {
      border-color: #d85b4f;
      background: #ffe1dc;
    }

    .choice-option:disabled {
      cursor: default;
      opacity: .82;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .btn {
      min-height: 68px;
      border: 0;
      border-radius: 24px;
      color: white;
      font-size: clamp(18px, 3.4vw, 25px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(83, 58, 27, .23);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 rgba(83, 58, 27, .23);
    }

    .check { background: linear-gradient(180deg, #94d15b, #4a9d3e); }
    .hint { background: linear-gradient(180deg, #ffd56b, #f0a62e); }
    .next { background: linear-gradient(180deg, #84c5fa, #3f91d7); }

    .feedback {
      min-height: 42px;
      margin-top: 16px;
      font-size: clamp(18px, 3.5vw, 26px);
      font-weight: 900;
      text-align: center;
      color: var(--muted);
    }

    .feedback.good { color: #318338; }
    .feedback.bad { color: #c94a3f; }

    .answer-panel.shake {
      animation: shake .3s ease;
    }

    .celebration {
      position: fixed;
      inset: auto 18px 24px;
      z-index: 20;
      display: none;
      justify-content: center;
      pointer-events: none;
    }

    .celebration.show {
      display: flex;
      animation: popIn .75s ease both;
    }

    .celebration-card {
      max-width: 640px;
      padding: 18px 24px;
      border: 4px solid #f0ad34;
      border-radius: 28px;
      background: #fff8dd;
      color: #5a351d;
      box-shadow: 0 14px 0 rgba(142, 93, 30, .18), 0 22px 42px rgba(90, 55, 24, .24);
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 900;
      text-align: center;
    }

    .spark {
      position: fixed;
      z-index: 19;
      top: 18%;
      font-size: 28px;
      animation: sparkle 1s ease-out forwards;
      pointer-events: none;
    }

    @keyframes popIn {
      0% { transform: translateY(16px) scale(.92); opacity: 0; }
      22% { transform: translateY(0) scale(1.04); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes sparkle {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(210px) rotate(210deg); opacity: 0; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-5px); }
    }

    .word-list {
      border: 3px solid #e4bf75;
      border-radius: 28px;
      padding: 18px;
      background: rgba(255, 253, 247, .88);
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .list-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .toggle {
      border: 2px solid #e1ad49;
      border-radius: 999px;
      padding: 8px 14px;
      background: #fffaf0;
      color: #774d24;
      font-weight: 800;
      cursor: pointer;
    }

    .words {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px 14px;
      max-height: 360px;
      overflow: auto;
    }

    .word-item {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 8px;
      padding: 9px;
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.25;
      background: #fff8e8;
    }

    .word-item.current {
      background: #e6f3bd;
      outline: 3px solid rgba(93, 163, 67, .28);
    }

    .word-item b { display: block; }
    .word-item small { color: #73563d; font-weight: 700; }

    .parent-note {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 13px 18px;
      border: 3px solid #a9bf72;
      border-radius: 999px;
      background: #f4f8d8;
      font-size: 20px;
      font-weight: 800;
      color: #5e7d31;
    }

    .mini-capy {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
    }

    .hidden { display: none; }

    @media (max-width: 720px) {
      .app { padding: 12px 10px 22px; }
      header {
        grid-template-columns: 54px 1fr 76px;
        gap: 8px;
      }

      .icon-btn, .score {
        min-height: 54px;
        border-radius: 17px;
      }

      .score small { font-size: 12px; }
      .score strong { font-size: 24px; }
      .mission-bar { grid-template-columns: 1fr; gap: 9px; }
      .mission-chip { min-height: 58px; border-radius: 18px; padding: 8px; gap: 7px; }
      .mission-chip span { font-size: 22px; }
      .mission-chip strong { font-size: 18px; }
      .mission-chip small { font-size: 12px; }
      .progress-label { font-size: 16px; padding: 10px 14px; }
      .dot { width: 35px; height: 35px; font-size: 15px; }
      .river-scene { min-height: 250px; border-radius: 24px; }
      .stone-row { inset: 106px 16px auto; gap: 9px; }
      .stone { height: 56px; font-size: 22px; border-width: 3px; }
      .capy { top: 78px; width: 94px; height: 94px; }
      .flag { height: 100px; top: 80px; right: 15px; }
      main { margin-top: -28px; }
      .question { padding: 22px 14px; border-radius: 26px; }
      .q-num { margin-top: -50px; font-size: 19px; padding: 9px 24px; }
      .answer-panel { padding: 14px; border-radius: 24px; }
      input { min-height: 62px; border-radius: 16px; }
      .choice-grid { grid-template-columns: 1fr; gap: 10px; }
      .choice-option { min-height: 60px; border-radius: 18px; font-size: 20px; }
      .controls { grid-template-columns: 1fr; }
      .btn { min-height: 58px; border-radius: 18px; }
      .words { grid-template-columns: 1fr; max-height: 320px; }
      .word-item { font-size: 17px; }
      .parent-note { align-items: flex-start; border-radius: 22px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <button class="icon-btn" id="restartBtn" aria-label="重新开始">
        <span class="hamburger" aria-hidden="true"><span></span><span></span><span></span></span>
      </button>
      <div class="brand">
        <h1>水豚 Ejaan 小游戏</h1>
        <div class="tagline">读一读 · 拼一拼 · 过河去！</div>
      </div>
      <div class="score" aria-live="polite">
        <small>得分</small>
        <strong id="score">0</strong>
      </div>
    </header>

    <section class="progress-card" aria-label="进度">
      <div class="progress-label" id="progressLabel">进度 1 / 17</div>
      <div id="dots" class="dots" style="display:contents"></div>
    </section>

    <section class="mission-bar" aria-label="游戏奖励">
      <div class="mission-chip"><span>🍊</span><div><strong id="snacks">0</strong><small>收集小橙子</small></div></div>
      <div class="mission-chip"><span>🔥</span><div><strong id="streak">0 连对</strong><small>Combo 奖励</small></div></div>
      <button class="mission-chip" id="shuffleBtn" type="button"><span>🎲</span><div><strong>打乱挑战</strong><small>换个顺序玩</small></div></button>
      <button class="mission-chip" id="soundBtn" type="button"><span id="soundIcon">🔇</span><div><strong id="soundLabel">开启音效</strong><small>可爱叮咚声</small></div></button>
    </section>

    <section class="river-scene" aria-label="水豚过河路线">
      <svg class="capy" id="capy" viewBox="0 0 220 190" role="img" aria-label="水豚">
        <ellipse cx="98" cy="163" rx="86" ry="20" fill="#77c8c4"/>
        <ellipse cx="94" cy="103" rx="86" ry="54" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
        <circle cx="150" cy="65" r="48" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
        <circle cx="124" cy="30" r="15" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
        <circle cx="176" cy="31" r="15" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
        <circle cx="138" cy="58" r="5" fill="#3a2418"/>
        <ellipse cx="181" cy="73" rx="9" ry="7" fill="#3a2418"/>
        <ellipse cx="163" cy="91" rx="31" ry="20" fill="#d8aa78"/>
        <path d="M151 96c16 6 31 4 42-3" fill="none" stroke="#5b3924" stroke-width="4" stroke-linecap="round"/>
        <circle cx="72" cy="54" r="15" fill="#f6a23a"/>
        <rect x="54" y="75" width="43" height="58" rx="16" fill="#5aa75a" stroke="#357a3b" stroke-width="4" transform="rotate(-13 76 104)"/>
        <ellipse cx="56" cy="143" rx="17" ry="24" fill="#4b301f"/>
        <ellipse cx="129" cy="143" rx="17" ry="24" fill="#4b301f"/>
      </svg>
      <div class="stone-row" aria-hidden="true">
        <div class="stone">1</div>
        <div class="stone">2</div>
        <div class="stone">3</div>
        <div class="stone">4</div>
        <div class="stone">5</div>
      </div>
      <div class="flag" aria-hidden="true"></div>
    </section>

    <main>
      <section class="question">
        <div class="q-num" id="questionNum">第 1 题</div>
        <div class="meaning" id="meaning">形状</div>
        <div class="pinyin" id="pinyin">(xíng zhuàng)</div>
        <div class="hint-line" id="hintLine">读一读意思，然后拼出正确的 ejaan 吧！</div>
      </section>

      <section class="answer-panel">
        <div class="mode-badge" id="modeBadge">选择正确马来文</div>
        <div class="answer-row">
          <input id="answerInput" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="在这里输入 ejaan..." />
        </div>
        <div class="choice-grid hidden" id="choiceGrid"></div>
        <div class="controls">
          <button class="btn check" id="checkBtn">检查答案</button>
          <button class="btn hint" id="hintBtn">提示 Hint</button>
          <button class="btn next" id="nextBtn">下一题</button>
        </div>
        <div class="feedback" id="feedback" aria-live="polite"></div>
      </section>

      <section class="word-list" id="wordList">
        <div class="list-head">
          <h2>单词列表（共 17 题）</h2>
          <button class="toggle" id="toggleWords">展开</button>
        </div>
        <div class="words hidden" id="words"></div>
      </section>

      <div class="parent-note">
        <svg class="mini-capy" viewBox="0 0 220 190" aria-hidden="true">
          <ellipse cx="98" cy="163" rx="86" ry="20" fill="#77c8c4"/>
          <ellipse cx="94" cy="103" rx="86" ry="54" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
          <circle cx="150" cy="65" r="48" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
          <circle cx="124" cy="30" r="15" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
          <circle cx="176" cy="31" r="15" fill="#a97443" stroke="#5b3924" stroke-width="5"/>
          <circle cx="138" cy="58" r="5" fill="#3a2418"/>
          <ellipse cx="181" cy="73" rx="9" ry="7" fill="#3a2418"/>
          <ellipse cx="163" cy="91" rx="31" ry="20" fill="#d8aa78"/>
        </svg>
        <span>小贴士：每天练一轮就好。拼错时看答案、读三次，再试一次。</span>
      </div>
    </main>
  </div>

  <div class="celebration" id="celebration" aria-live="polite">
    <div class="celebration-card" id="celebrationText">太棒了！</div>
  </div>

  <script>
    const baseWords = [
      { word: "Berbentuk", meaning: "形状", pinyin: "xíng zhuàng" },
      { word: "Membubuh baja", meaning: "施肥", pinyin: "shī féi" },
      { word: "Mencantikkan", meaning: "美化", pinyin: "měi huà" },
      { word: "Menghidangkan", meaning: "端食物", pinyin: "duān shí wù" },
      { word: "Jejantas", meaning: "行人天桥", pinyin: "xíng rén tiān qiáo" },
      { word: "Melintas jalan", meaning: "过马路", pinyin: "guò mǎ lù" },
      { word: "Pelanggan", meaning: "顾客", pinyin: "gù kè" },
      { word: "Sagu hati", meaning: "安慰奖", pinyin: "ān wèi jiǎng" },
      { word: "Balai raya", meaning: "民众会堂", pinyin: "mín zhòng huì táng" },
      { word: "Kasut getah", meaning: "橡胶鞋", pinyin: "xiàng jiāo xié" },
      { word: "Alat tulis", meaning: "文具", pinyin: "wén jù" },
      { word: "Mengikat", meaning: "绑", pinyin: "bǎng" },
      { word: "Menjemput = mengajak", meaning: "邀请", pinyin: "yāo qǐng" },
      { word: "Mengumpul", meaning: "收集", pinyin: "shōu jí" },
      { word: "Memeriksa", meaning: "检查", pinyin: "jiǎn chá" },
      { word: "Mendirikan khemah", meaning: "搭帐篷", pinyin: "dā zhàng péng" },
      { word: "Mengadakan = menganjurkan", meaning: "举办", pinyin: "jǔ bàn" }
    ];

    let words = [...baseWords];
    let index = 0;
    let score = 0;
    let streak = 0;
    let snacks = 0;
    let answered = new Set();
    let showingWords = false;
    let modes = [];
    let currentChoices = [];
    let soundOn = false;
    let audioCtx = null;
    const cheers = ["太棒了！水豚过河啦！", "答对了！收集 1 个小橙子！", "Nice! 继续冲下一题！", "好厉害，ejaan 越来越稳！", "Combo! 水豚开心跳一下！"];

    const $ = (id) => document.getElementById(id);
    const normalize = (value) => value.toLowerCase().replace(/\s*=\s*/g, "=").replace(/\s+/g, " ").trim();
    const acceptedAnswers = (word) => {
      const full = normalize(word);
      const parts = word.split("=").map(part => normalize(part));
      return [...new Set([full, ...parts])];
    };

    function shuffleArray(items) {
      return [...items].sort(() => Math.random() - .5);
    }

    function buildModes() {
      modes = words.map((_, i) => i % 3 === 1 ? "type" : "choose");
    }

    function currentMode() {
      return modes[index] || "choose";
    }

    function makeChoices(correctWord) {
      const others = words.map(item => item.word).filter(word => word !== correctWord);
      return shuffleArray([correctWord, ...shuffleArray(others).slice(0, 3)]);
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq, start, duration, type = "sine", gain = 0.055) {
      if (!soundOn) return;
      if (!(window.AudioContext || window.webkitAudioContext)) return playFallback(freq, duration);
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const vol = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
      vol.gain.setValueAtTime(0.0001, audioCtx.currentTime + start);
      vol.gain.exponentialRampToValueAtTime(gain, audioCtx.currentTime + start + 0.015);
      vol.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + duration);
      osc.connect(vol).connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + start);
      osc.stop(audioCtx.currentTime + start + duration + 0.02);
    }

    function playFallback(freq, duration) {
      const rate = 8000;
      const length = Math.floor(rate * Math.max(duration, .08));
      const data = new Uint8Array(44 + length * 2);
      const view = new DataView(data.buffer);
      const write = (offset, text) => [...text].forEach((ch, i) => data[offset + i] = ch.charCodeAt(0));
      write(0, "RIFF");
      view.setUint32(4, 36 + length * 2, true);
      write(8, "WAVEfmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, rate, true);
      view.setUint32(28, rate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      write(36, "data");
      view.setUint32(40, length * 2, true);
      for (let i = 0; i < length; i++) {
        const fade = 1 - i / length;
        const sample = Math.sin(2 * Math.PI * freq * i / rate) * 0.22 * fade;
        view.setInt16(44 + i * 2, sample * 32767, true);
      }
      const blob = new Blob([data], { type: "audio/wav" });
      const audio = new Audio(URL.createObjectURL(blob));
      audio.volume = 0.45;
      audio.play().catch(() => {});
      window.setTimeout(() => URL.revokeObjectURL(audio.src), 1000);
    }

    function playSound(kind) {
      if (!soundOn) return;
      if (kind === "correct") {
        tone(660, 0, .12, "sine", .06);
        tone(880, .10, .14, "sine", .055);
        tone(1175, .22, .18, "triangle", .04);
      } else if (kind === "wrong") {
        tone(220, 0, .16, "triangle", .045);
        tone(165, .13, .18, "sine", .035);
      } else if (kind === "hint") {
        tone(784, 0, .08, "triangle", .04);
        tone(988, .09, .11, "triangle", .035);
      } else if (kind === "click") {
        tone(520, 0, .055, "sine", .025);
      } else if (kind === "finish") {
        [523, 659, 784, 1047].forEach((f, i) => tone(f, i * .09, .18, "triangle", .05));
      }
    }

    function toggleSound() {
      soundOn = !soundOn;
      if (soundOn) {
        if (window.AudioContext || window.webkitAudioContext) ensureAudio();
        $("soundIcon").textContent = "🔊";
        $("soundLabel").textContent = "音效开启";
        playSound("hint");
      } else {
        $("soundIcon").textContent = "🔇";
        $("soundLabel").textContent = "开启音效";
      }
    }

    function renderDots() {
      $("dots").innerHTML = words.map((_, i) => {
        const cls = i < index ? "done" : i === index ? "current" : "";
        return `<div class="dot ${cls}">${i + 1}</div>`;
      }).join("");
    }

    function renderWords() {
      $("words").innerHTML = words.map((item, i) => `
        <button class="word-item ${i === index ? "current" : ""}" data-i="${i}" type="button">
          <span><b>${i + 1}.</b></span>
          <span><b>${item.meaning}</b><small>${item.word}</small></span>
        </button>
      `).join("");
      document.querySelectorAll(".word-item").forEach(btn => {
        btn.addEventListener("click", () => {
          index = Number(btn.dataset.i);
          update();
        });
      });
    }

    function renderChoices(item) {
      currentChoices = makeChoices(item.word);
      $("choiceGrid").innerHTML = currentChoices.map((choice, i) => `
        <button class="choice-option" type="button" data-choice="${i}">${choice}</button>
      `).join("");
      document.querySelectorAll(".choice-option").forEach(btn => {
        btn.addEventListener("click", () => checkChoice(currentChoices[Number(btn.dataset.choice)], btn));
      });
    }

    function updateCapy() {
      const percent = Math.min(82, 6 + index * (76 / (words.length - 1)));
      $("capy").style.setProperty("--capy-x", `${percent}%`);
      $("capy").classList.add("hop");
      window.setTimeout(() => $("capy").classList.remove("hop"), 260);
    }

    function update() {
      const item = words[index];
      $("questionNum").textContent = `第 ${index + 1} 题`;
      $("meaning").textContent = item.meaning;
      $("pinyin").textContent = `(${item.pinyin})`;
      $("progressLabel").textContent = `进度 ${index + 1} / ${words.length}`;
      $("score").textContent = score;
      $("streak").textContent = `${streak} 连对`;
      $("snacks").textContent = snacks;
      $("answerInput").value = "";
      $("feedback").textContent = "";
      $("feedback").className = "feedback";
      const isChoose = currentMode() === "choose";
      $("hintLine").textContent = isChoose ? "看华文意思，点选正确的马来文！" : "看意思，拼出正确 ejaan！";
      $("modeBadge").textContent = isChoose ? "选择题：找马来文" : "打字题：拼 ejaan";
      document.querySelector(".answer-row").classList.toggle("hidden", isChoose);
      $("choiceGrid").classList.toggle("hidden", !isChoose);
      $("checkBtn").classList.toggle("hidden", isChoose);
      if (isChoose) {
        renderChoices(item);
      } else {
        $("choiceGrid").innerHTML = "";
      }
      renderDots();
      renderWords();
      updateCapy();
      if (isChoose) {
        const firstChoice = document.querySelector(".choice-option");
        if (firstChoice) firstChoice.focus({ preventScroll: true });
      } else {
        $("answerInput").focus({ preventScroll: true });
      }
    }

    function celebrate(message) {
      $("celebrationText").textContent = message;
      $("celebration").classList.remove("show");
      void $("celebration").offsetWidth;
      $("celebration").classList.add("show");
      for (let i = 0; i < 10; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.textContent = i % 3 === 0 ? "🍊" : i % 3 === 1 ? "✨" : "🌿";
        spark.style.left = `${8 + Math.random() * 84}%`;
        spark.style.animationDelay = `${Math.random() * .18}s`;
        document.body.appendChild(spark);
        window.setTimeout(() => spark.remove(), 1100);
      }
      window.setTimeout(() => $("celebration").classList.remove("show"), 1250);
    }

    function checkAnswer() {
      if (currentMode() === "choose") return;
      const item = words[index];
      const answer = normalize($("answerInput").value);
      const choices = acceptedAnswers(item.word);
      const ok = choices.includes(answer);
      if (!answer) {
        $("feedback").textContent = "先输入 ejaan，再检查哦。";
        $("feedback").className = "feedback bad";
        return;
      }
      if (ok) {
        if (!answered.has(index)) {
          streak += 1;
          snacks += 1;
          score += 10 + Math.max(0, streak - 1) * 2;
          answered.add(index);
        }
        const cheer = cheers[Math.floor(Math.random() * cheers.length)];
        $("feedback").textContent = `${cheer} +${10 + Math.max(0, streak - 1) * 2} 分`;
        $("feedback").className = "feedback good";
        $("streak").textContent = `${streak} 连对`;
        $("snacks").textContent = snacks;
        playSound("correct");
        celebrate(cheer);
        window.setTimeout(nextQuestion, 650);
      } else {
        streak = 0;
        $("streak").textContent = "0 连对";
        $("feedback").textContent = `再试一次。正确答案：${item.word}。请读 3 次。`;
        $("feedback").className = "feedback bad";
        $("answerInput").value = "";
        $("answerInput").placeholder = "读 3 次后，再输入一次...";
        document.querySelector(".answer-panel").classList.remove("shake");
        void document.querySelector(".answer-panel").offsetWidth;
        document.querySelector(".answer-panel").classList.add("shake");
        playSound("wrong");
      }
      $("score").textContent = score;
    }

    function checkChoice(selected, button) {
      const item = words[index];
      const ok = acceptedAnswers(item.word).includes(normalize(selected));
      document.querySelectorAll(".choice-option").forEach(btn => {
        btn.disabled = true;
        const choice = currentChoices[Number(btn.dataset.choice)];
        if (acceptedAnswers(item.word).includes(normalize(choice))) btn.classList.add("correct");
      });
      if (ok) {
        if (!answered.has(index)) {
          streak += 1;
          snacks += 1;
          score += 10 + Math.max(0, streak - 1) * 2;
          answered.add(index);
        }
        const cheer = cheers[Math.floor(Math.random() * cheers.length)];
        $("feedback").textContent = `${cheer} +${10 + Math.max(0, streak - 1) * 2} 分`;
        $("feedback").className = "feedback good";
        $("streak").textContent = `${streak} 连对`;
        $("snacks").textContent = snacks;
        $("score").textContent = score;
        playSound("correct");
        celebrate(cheer);
        window.setTimeout(nextQuestion, 750);
      } else {
        streak = 0;
        $("streak").textContent = "0 连对";
        button.classList.add("wrong");
        $("feedback").textContent = `再看一次华文意思。正确答案：${item.word}。请读 3 次。`;
        $("feedback").className = "feedback bad";
        document.querySelector(".answer-panel").classList.remove("shake");
        void document.querySelector(".answer-panel").offsetWidth;
        document.querySelector(".answer-panel").classList.add("shake");
        playSound("wrong");
      }
    }

    function showHint() {
      const item = words[index].word;
      if (currentMode() === "choose") {
        $("feedback").textContent = `提示：答案第一个字母是 ${item.trim()[0].toUpperCase()}。`;
        $("feedback").className = "feedback";
        playSound("hint");
        return;
      }
      const clean = item.replace(/\s*=\s*/g, " = ");
      const hint = clean.split("").map((ch, i) => {
        if (ch === " " || ch === "=") return ch;
        return i === 0 || i === clean.length - 1 ? ch : "_";
      }).join(" ");
      $("hintLine").textContent = `提示：${hint}`;
      $("feedback").textContent = "看提示后，自己拼完整。";
      $("feedback").className = "feedback";
      playSound("hint");
    }

    function nextQuestion() {
      playSound("click");
      if (index < words.length - 1) {
        index += 1;
        update();
      } else {
        $("feedback").textContent = `完成啦！今天得分 ${score}。可以给孩子一个小奖励。`;
        $("feedback").className = "feedback good";
        updateCapy();
        playSound("finish");
      }
    }

    function restart() {
      playSound("click");
      words = [...baseWords];
      index = 0;
      score = 0;
      streak = 0;
      snacks = 0;
      answered = new Set();
      buildModes();
      update();
    }

    function shuffleGame() {
      words = [...baseWords].sort(() => Math.random() - .5);
      index = 0;
      score = 0;
      streak = 0;
      snacks = 0;
      answered = new Set();
      buildModes();
      celebrate("新的路线开始啦！");
      playSound("hint");
      update();
    }

    $("checkBtn").addEventListener("click", checkAnswer);
    $("hintBtn").addEventListener("click", showHint);
    $("nextBtn").addEventListener("click", nextQuestion);
    $("restartBtn").addEventListener("click", restart);
    $("shuffleBtn").addEventListener("click", shuffleGame);
    $("soundBtn").addEventListener("click", toggleSound);
    $("answerInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkAnswer();
    });
    $("toggleWords").addEventListener("click", () => {
      showingWords = !showingWords;
      $("words").classList.toggle("hidden", !showingWords);
      $("toggleWords").textContent = showingWords ? "收起" : "展开";
    });

    buildModes();
    renderDots();
    renderWords();
    update();
  </script>
</body>
</html>
